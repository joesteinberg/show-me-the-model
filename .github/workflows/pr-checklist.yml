name: PR Checklist

on:
  pull_request:
    types: [opened]

jobs:
  post-checklist:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## PR Checklist

            Thanks for the contribution! Before this is reviewed, please make sure:

            - [ ] Linting passes locally (\`ruff check backend/\` · \`cd frontend && npm run lint\`)
            - [ ] Type hints added to any new Python functions
            - [ ] Docs updated if this changes any behavior, API, or prompt format
            - [ ] No secrets or API keys in the diff (\`git diff\` — check carefully)
            - [ ] If prompts changed: which stage(s) and what changed is described above

            If you're unsure about any of these, leave a comment and a maintainer will help.`
            });
